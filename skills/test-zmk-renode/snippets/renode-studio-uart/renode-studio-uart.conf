# NB: nRF52840/XIAO-specific -- pairs with renode-studio-uart.overlay (see
# that file's header comment). Mirrors build_fw.py's COMMON_ARGS +
# STUDIO_TRANSPORT_ARGS; keep the two in sync if either changes (see that
# script's module docstring for why each line exists).
#
# No USB (its HW model hangs forever under Renode), no BLE (avoids a
# controller-command-timeout kernel oops with an empty NVS/no controller
# under Renode), console+log wired to a real UART instead of the board's
# default USB-CDC path, and the board's "CDC ACM as serial backend" Kconfig
# cascade turned off (it silently re-enables USB_DEVICE_STACK and hangs the
# same way even with the overlay's DT nodes disabled).
CONFIG_ZMK_USB=n
CONFIG_ZMK_BLE=n
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_LOG=y
# Zephyr's own default; included here defensively -- see build_fw.py's
# COMMON_ARGS comment for the deferred-log-ring-buffer-overflow story this
# guards against.
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=0
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Swap in the Renode-only ZMK_TRANSPORT_NONE Studio RPC UART transport in
# place of the real (USB-gated) one -- see renode-test-module/Kconfig. Only
# takes effect when CONFIG_ZMK_STUDIO_RPC is enabled (e.g. via
# CONFIG_ZMK_STUDIO=y elsewhere); harmless no-op otherwise.
CONFIG_ZMK_STUDIO_TRANSPORT_UART=n
CONFIG_ZMK_RENODE_STUDIO_UART_TRANSPORT=y
