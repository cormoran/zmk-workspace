name: "ZMK Renode Test"
description: >-
  Boot an already-built ZMK module firmware ELF in the Renode emulator, run
  a generic boot + core Studio RPC smoke test, and (optionally) the
  module's own Renode test suite. This action does NOT build firmware --
  the caller builds the Renode-testable ELF itself (as a normal
  `build.yaml` artifact, using the `renode-studio-uart` snippet this repo
  provides as a Zephyr module -- see README.md) and passes the resulting
  path via `elf-path`. See README.md in this directory for the full
  contract and a usage example. Backed by skills/test-zmk-renode/ in this
  same repo -- read that skill's SKILL.md / references/renode-notes.md for
  the underlying gotchas.

# Path inputs (`west-topdir`, `elf-path`) may be relative; relative paths
# are resolved against $GITHUB_WORKSPACE *inside the step* (NOT via the
# ${{ github.workspace }} expression). This matters for container jobs: the
# expression evaluates to the runner-host path (/home/runner/work/...)
# while the checkout is mounted at /__w/... inside the container -- the env
# var is translated, expressions are not (same actions/runner#716 family as
# action_path). Prefer passing relative paths.
inputs:
  west-topdir:
    description: >-
      Path to the consuming module's own west workspace root (its checkout,
      for a module with an embedded workspace -- the default `west topdir`
      layout this action was built against). Used only to locate the
      caller's west dependencies for compiling studio protos (the smoke
      test) -- NOT for building firmware. Default: the workspace root.
    required: false
    default: "."
  elf-path:
    description: >-
      Path to the already-built firmware ELF to test (relative paths are
      resolved against $GITHUB_WORKSPACE). The caller is responsible for
      building this -- typically a `build.yaml` artifact built with the
      `renode-studio-uart` snippet (see README.md) in an earlier workflow
      step.
    required: true
  tests:
    description: >-
      Path (relative to `west-topdir`) to a directory of the module's own
      Renode test files to run after the smoke test, e.g. `tests/renode`.
      Run via `python3 <file> -v` for every `*_test.py` directly under it
      (non-recursive). Leave empty to run only the generic smoke test.
    required: false
    default: ""
  renode-version:
    description: "Renode portable release version to install."
    default: "1.16.1"
  boot-timeout-seconds:
    description: "Smoke test: seconds to wait for the ZMK boot banner."
    default: "20"

outputs:
  elf-path:
    description: "Absolute path to the (caller-built) firmware ELF."
    value: ${{ steps.resolve-elf.outputs.elf-path }}

runs:
  using: "composite"
  steps:
    - name: Resolve paths
      id: paths
      shell: bash
      # NB: must use the $GITHUB_ACTION_PATH env var, NOT the
      # ${{ github.action_path }} expression -- inside a container job the
      # expression evaluates to the *host* path (/home/runner/work/_actions/...)
      # while the files are mounted at /__w/_actions/... in the container;
      # the env var is path-translated by the runner, the expression is not
      # (actions/runner#716). This bit us on the first CI run.
      run: |
        scripts_dir="$(cd "$GITHUB_ACTION_PATH/../../../skills/test-zmk-renode/scripts" && pwd)"
        echo "scripts-dir=$scripts_dir" >> "$GITHUB_OUTPUT"

    - name: Cache Renode install
      uses: actions/cache@v4
      with:
        path: ~/.renode
        key: renode-${{ inputs.renode-version }}-${{ runner.os }}

    - name: Install Renode
      shell: bash
      run: bash "${{ steps.paths.outputs.scripts-dir }}/install_renode.sh" "${{ inputs.renode-version }}"

    - name: Install Python + protoc dependencies
      shell: bash
      # The zmkfirmware/zmk-build-arm:stable container has python3 but no
      # `python3 -m pip` (west comes preinstalled some other way), and no
      # sudo (steps already run as root) -- try the least invasive route
      # first and fall back progressively.
      run: |
        apt_get() {
          if command -v sudo >/dev/null 2>&1; then sudo apt-get "$@"; else apt-get "$@"; fi
        }
        apt_updated=""
        apt_install() {
          if [ -z "$apt_updated" ]; then apt_get update -y; apt_updated=1; fi
          apt_get install -y --no-install-recommends "$@"
        }

        if ! python3 -c "import google.protobuf" >/dev/null 2>&1; then
          python3 -m pip install --quiet protobuf 2>/dev/null \
            || pip3 install --quiet protobuf 2>/dev/null \
            || apt_install python3-protobuf
          python3 -c "import google.protobuf; print('python protobuf', google.protobuf.__version__)"
        fi

        if ! command -v protoc >/dev/null 2>&1; then
          apt_install protobuf-compiler
        fi
        protoc --version

    - name: Resolve ELF + west-topdir paths
      id: resolve-elf
      shell: bash
      # Resolve every (possibly relative) path input against
      # $GITHUB_WORKSPACE -- the env var, which is container-path-translated,
      # unlike the ${{ github.workspace }} expression (see the header note).
      env:
        IN_WEST_TOPDIR: ${{ inputs.west-topdir }}
        IN_ELF_PATH: ${{ inputs.elf-path }}
      run: |
        abspath() {
          case "$1" in
            /*) echo "$1" ;;
            *)  echo "$GITHUB_WORKSPACE/$1" ;;
          esac
        }
        echo "west-topdir=$(abspath "$IN_WEST_TOPDIR")" >> "$GITHUB_OUTPUT"
        elf_path="$(abspath "$IN_ELF_PATH")"
        if [ ! -f "$elf_path" ]; then
          echo "::error::elf-path does not exist: $elf_path (this action does not build firmware -- build it as a normal step before calling this action; see README.md)"
          exit 1
        fi
        echo "elf-path=$elf_path" >> "$GITHUB_OUTPUT"

    - name: Generic smoke test (boot + core Studio RPC)
      shell: bash
      run: |
        python3 "${{ steps.paths.outputs.scripts-dir }}/renode_smoke.py" \
          --elf "${{ steps.resolve-elf.outputs.elf-path }}" \
          --west-topdir "${{ steps.resolve-elf.outputs.west-topdir }}" \
          --renode-version "${{ inputs.renode-version }}" \
          --boot-timeout "${{ inputs.boot-timeout-seconds }}"

    - name: Module's own Renode tests
      if: ${{ inputs.tests != '' }}
      shell: bash
      env:
        ZMK_RENODE_ELF: ${{ steps.resolve-elf.outputs.elf-path }}
      run: |
        export PYTHONPATH="${{ steps.paths.outputs.scripts-dir }}${PYTHONPATH:+:$PYTHONPATH}"
        tests_dir="${{ steps.resolve-elf.outputs.west-topdir }}/${{ inputs.tests }}"
        found=0
        for f in "$tests_dir"/*_test.py; do
          [ -e "$f" ] || continue
          found=1
          echo "::group::python3 $f -v"
          python3 "$f" -v
          echo "::endgroup::"
        done
        if [ "$found" -eq 0 ]; then
          echo "::warning::no *_test.py files found directly under $tests_dir"
        fi
